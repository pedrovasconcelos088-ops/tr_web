    <main class="contato-main">
        <div class="contato-container">
            
            <div class="contato-info">
               <section class="mapa">
            <h2 class="titulos">Estabelecimento</h2>
            <p>Veja abaixo onde nos encontrar!</p>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3036.0051198013084!2d-3.6909497234917508!3d40.453023653428865!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd4228e23705d39f%3A0xa8fff6d26e2b1988!2zQmVybmFiw6l1!5e0!3m2!1spt-BR!2sbr!4v1774563131353!5m2!1spt-BR!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

                <h2>Siga-nos</h2>
                <div class="redes-sociais">
                    <a href="https://facebook.com" target="_blank" class="rede-icone">F</a>
                    <a href="https://twitter.com" target="_blank" class="rede-icone">T</a>
                    <a href="https://instagram.com" target="_blank" class="rede-icone">I</a>
                    <a href="https://plus.google.com" target="_blank" class="rede-icone">G+</a>
                </div>
            </div>

            <div class="contato-formulario">
                <h2>Formulário de Contato</h2>
                <form action="#" method="POST">
                    <div class="input-grupo">
                        <input type="text" placeholder="Insira seu nome" required>
                    </div>
                    
                    <div class="input-grupo">
                        <input type="email" placeholder="Insira um endereço de e-mail válido" required>
                    </div>
                    
                    <div class="input-grupo">
                        <textarea placeholder="Insira sua mensagem" rows="5" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn-enviar">Enviar</button>
                </form>
            </div>

        </div>
    </main>

    <footer>
        <img src="../img/footer2.png" class="logo_footer">
