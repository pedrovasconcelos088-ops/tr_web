<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../estilo/style.css">
</head>

<body>
    <main>
        <section class="section-popup">
            <div>
                <h1 id="nomeExp"></h1>
                <img id="imagemExp" src="">
                <p id="descricaoExp"></p>
            </div>
        </section>
    </main>
</body>
<script>
    function getDados(dado){
        urlParams = new URLSearchParams(window.location.search)
        return urlParams.get(dado);
    }

    document.getElementById("nomeExp").textContent=getDados("produto");
    document.getElementById("imagemExp").src=getDados("imagem");
    document.getElementById("descricaoExp").textContent=getDados("descricao");
</script>
</html>
